services:
  db:
    image: postgres:16-alpine
    container_name: hcp_crm_db
    restart: unless-stopped

    environment:
      POSTGRES_DB: ai_first_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_first_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: hcp_crm_backend
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    env_file:
      - ./backend/.env

    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/ai_first_crm

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: hcp_crm_frontend
    restart: unless-stopped

    depends_on:
      - backend

    env_file:
      - ./frontend/.env

    environment:
      VITE_API_URL: http://localhost:8000

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data: